<svg width="520" height="340" viewBox="0 0 520 340" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="timeBarGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#635BFF"/>
      <stop offset="100%" stop-color="#8B85FF"/>
    </linearGradient>
    <filter id="s3Shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#0A2540" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Card -->
  <rect width="520" height="340" rx="14" fill="#FFFFFF" filter="url(#s3Shadow)"/>
  <rect x="0.5" y="0.5" width="519" height="339" rx="13.5" stroke="#E3E8EF" stroke-width="1"/>

  <!-- Top bar -->
  <rect x="0" y="0" width="520" height="56" rx="14" fill="#FAFBFC"/>
  <rect x="0" y="42" width="520" height="14" fill="#FAFBFC"/>
  <line x1="0" y1="56" x2="520" y2="56" stroke="#E3E8EF" stroke-width="1"/>
  <text x="24" y="35" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#0A2540">Time to Results</text>
  <rect x="410" y="16" rx="8" width="90" height="24" fill="#F0EEFF"/>
  <text x="455" y="33" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#635BFF" text-anchor="middle">3x faster</text>

  <!-- Metric -->
  <text x="24" y="92" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" letter-spacing="0.5" fill="#8792A2">DAYS TO FIRST DELIVERABLE</text>
  <text x="24" y="124" font-family="system-ui, -apple-system, sans-serif" font-size="34" font-weight="700" fill="#0A2540">30</text>
  <text x="68" y="124" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="500" fill="#8792A2">days vs 90+ days traditional</text>

  <!-- Traditional timeline -->
  <text x="24" y="168" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#8792A2">Traditional approach</text>

  <rect x="24" y="178" width="472" height="40" rx="8" fill="#F7F8FA"/>
  <!-- Hiring segment -->
  <rect x="24" y="178" width="157" height="40" rx="8" fill="#E3E8EF"/>
  <text x="102" y="202" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="500" fill="#8792A2" text-anchor="middle">Hiring</text>
  <!-- Onboarding segment -->
  <rect x="185" y="178" width="130" height="40" fill="#EEF0F3"/>
  <text x="250" y="202" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="500" fill="#8792A2" text-anchor="middle">Onboarding</text>
  <!-- First results -->
  <rect x="319" y="178" width="177" height="40" rx="0 8 8 0" fill="#F7F8FA"/>
  <text x="408" y="202" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="500" fill="#C0C5CD" text-anchor="middle">First results...</text>
  <text x="496" y="232" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="500" fill="#C0C5CD" text-anchor="end">90+ days</text>

  <!-- Sprint timeline -->
  <text x="24" y="264" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#0A2540">AI Sprint</text>

  <rect x="24" y="274" width="472" height="40" rx="8" fill="#F7F8FA"/>
  <rect x="24" y="274" width="157" height="40" rx="8" fill="url(#timeBarGrad)"/>
  <text x="102" y="298" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#FFFFFF" text-anchor="middle">All 5 deliverables</text>

  <!-- Completion marker -->
  <line x1="181" y1="268" x2="181" y2="322" stroke="#635BFF" stroke-width="1.5" stroke-dasharray="4 3"/>
  <rect x="156" y="322" width="50" height="18" rx="4" fill="#635BFF"/>
  <text x="181" y="334" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="600" fill="#FFFFFF" text-anchor="middle">30 days</text>
</svg>
