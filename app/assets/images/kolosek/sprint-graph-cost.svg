<svg width="520" height="340" viewBox="0 0 520 340" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="costBarGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#635BFF"/>
      <stop offset="100%" stop-color="#8B85FF"/>
    </linearGradient>
    <filter id="s2Shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#0A2540" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Card -->
  <rect width="520" height="340" rx="14" fill="#FFFFFF" filter="url(#s2Shadow)"/>
  <rect x="0.5" y="0.5" width="519" height="339" rx="13.5" stroke="#E3E8EF" stroke-width="1"/>

  <!-- Top bar -->
  <rect x="0" y="0" width="520" height="56" rx="14" fill="#FAFBFC"/>
  <rect x="0" y="42" width="520" height="14" fill="#FAFBFC"/>
  <line x1="0" y1="56" x2="520" y2="56" stroke="#E3E8EF" stroke-width="1"/>
  <text x="24" y="35" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#0A2540">Cost Comparison</text>
  <rect x="400" y="16" rx="8" width="100" height="24" fill="#ECFDF3"/>
  <text x="450" y="33" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#16A34A" text-anchor="middle">Save $12,000+</text>

  <!-- Metric -->
  <text x="24" y="92" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" letter-spacing="0.5" fill="#8792A2">TOTAL INVESTMENT</text>
  <text x="24" y="124" font-family="system-ui, -apple-system, sans-serif" font-size="34" font-weight="700" fill="#0A2540">60%</text>
  <text x="108" y="124" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="500" fill="#8792A2">lower cost than hiring</text>

  <!-- Submetrics -->
  <rect x="24" y="138" width="56" height="20" rx="4" fill="#F0EEFF"/>
  <text x="52" y="152" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#635BFF" text-anchor="middle">Fixed</text>
  <rect x="88" y="138" width="80" height="20" rx="4" fill="#F0F2F5"/>
  <text x="128" y="152" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="500" fill="#8792A2" text-anchor="middle">No surprises</text>

  <!-- Bar chart area -->
  <line x1="40" y1="295" x2="480" y2="295" stroke="#E3E8EF" stroke-width="1"/>

  <!-- Traditional bar -->
  <rect x="80" y="186" width="130" height="109" rx="8" fill="#F0F2F5"/>
  <rect x="80" y="186" width="130" height="109" rx="8" fill="#E3E8EF"/>
  <text x="145" y="178" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#0A2540" text-anchor="middle">$18,000</text>
  <text x="145" y="310" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#8792A2" text-anchor="middle">Traditional hire</text>
  <text x="145" y="324" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#C0C5CD" text-anchor="middle">~3 months</text>

  <!-- Sprint bar -->
  <rect x="310" y="250" width="130" height="45" rx="8" fill="url(#costBarGrad)"/>
  <text x="375" y="242" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#635BFF" text-anchor="middle">$5,500</text>
  <text x="375" y="310" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#0A2540" text-anchor="middle">AI Sprint</text>
  <text x="375" y="324" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#8792A2" text-anchor="middle">30 days</text>

  <!-- Savings arrow -->
  <path d="M230,230 L290,230" stroke="#16A34A" stroke-width="1.5" stroke-dasharray="4 3"/>
  <path d="M285,226 L292,230 L285,234" stroke="#16A34A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <text x="260" y="222" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="600" fill="#16A34A" text-anchor="middle">-60%</text>
</svg>
