<svg width="520" height="340" viewBox="0 0 520 340" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="speedGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#635BFF" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#635BFF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="tradGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8792A2" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#8792A2" stop-opacity="0"/>
    </linearGradient>
    <filter id="s1Shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#0A2540" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Card -->
  <rect width="520" height="340" rx="14" fill="#FFFFFF" filter="url(#s1Shadow)"/>
  <rect x="0.5" y="0.5" width="519" height="339" rx="13.5" stroke="#E3E8EF" stroke-width="1"/>

  <!-- Top bar -->
  <rect x="0" y="0" width="520" height="56" rx="14" fill="#FAFBFC"/>
  <rect x="0" y="42" width="520" height="14" fill="#FAFBFC"/>
  <line x1="0" y1="56" x2="520" y2="56" stroke="#E3E8EF" stroke-width="1"/>
  <text x="24" y="35" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#0A2540">Development Velocity</text>
  <rect x="420" y="16" rx="8" width="80" height="24" fill="#F0EEFF"/>
  <text x="460" y="33" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#635BFF" text-anchor="middle">+220%</text>

  <!-- Metric -->
  <text x="24" y="92" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" letter-spacing="0.5" fill="#8792A2">FEATURES SHIPPED PER WEEK</text>
  <text x="24" y="124" font-family="system-ui, -apple-system, sans-serif" font-size="34" font-weight="700" fill="#0A2540">3.2x</text>
  <text x="110" y="124" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="500" fill="#8792A2">faster than traditional</text>

  <!-- Legend -->
  <line x1="24" y1="148" x2="40" y2="148" stroke="#635BFF" stroke-width="2.5" stroke-linecap="round"/>
  <text x="46" y="152" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#0A2540">With AI Sprint</text>
  <line x1="170" y1="148" x2="186" y2="148" stroke="#D0D5DD" stroke-width="2" stroke-linecap="round"/>
  <text x="192" y="152" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#8792A2">Traditional</text>

  <!-- Grid -->
  <line x1="40" y1="180" x2="496" y2="180" stroke="#F0F2F5" stroke-width="1"/>
  <line x1="40" y1="210" x2="496" y2="210" stroke="#F0F2F5" stroke-width="1"/>
  <line x1="40" y1="240" x2="496" y2="240" stroke="#F0F2F5" stroke-width="1"/>
  <line x1="40" y1="270" x2="496" y2="270" stroke="#F0F2F5" stroke-width="1"/>
  <line x1="40" y1="300" x2="496" y2="300" stroke="#E3E8EF" stroke-width="1"/>

  <!-- X-axis -->
  <text x="40" y="318" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#8792A2" text-anchor="middle">Wk 1</text>
  <text x="116" y="318" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#8792A2" text-anchor="middle">Wk 2</text>
  <text x="192" y="318" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#8792A2" text-anchor="middle">Wk 3</text>
  <text x="268" y="318" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#8792A2" text-anchor="middle">Wk 4</text>

  <!-- Traditional line -->
  <path d="M40,290 C80,288 116,286 160,284 C200,282 240,280 280,278 C320,277 360,276 400,275" stroke="#D0D5DD" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M40,290 C80,288 116,286 160,284 C200,282 240,280 280,278 C320,277 360,276 400,275 L400,300 L40,300 Z" fill="url(#tradGrad)"/>

  <!-- AI Sprint line -->
  <path d="M40,288 C70,280 100,268 140,252 C180,236 210,222 250,208 C290,196 330,188 370,183 C410,179 450,177 490,176" stroke="#635BFF" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M40,288 C70,280 100,268 140,252 C180,236 210,222 250,208 C290,196 330,188 370,183 C410,179 450,177 490,176 L490,300 L40,300 Z" fill="url(#speedGrad)"/>

  <!-- End dots -->
  <circle cx="400" cy="275" r="4" fill="#FFFFFF" stroke="#D0D5DD" stroke-width="1.5"/>
  <circle cx="490" cy="176" r="8" fill="#635BFF" opacity="0.12"/>
  <circle cx="490" cy="176" r="5" fill="#FFFFFF" stroke="#635BFF" stroke-width="2.5"/>
</svg>
