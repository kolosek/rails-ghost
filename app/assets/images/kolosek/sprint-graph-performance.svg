<svg width="520" height="340" viewBox="0 0 520 340" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="perfGrad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#635BFF" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#635BFF" stop-opacity="0"/>
    </linearGradient>
    <filter id="s5Shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#0A2540" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Card -->
  <rect width="520" height="340" rx="14" fill="#FFFFFF" filter="url(#s5Shadow)"/>
  <rect x="0.5" y="0.5" width="519" height="339" rx="13.5" stroke="#E3E8EF" stroke-width="1"/>

  <!-- Top bar -->
  <rect x="0" y="0" width="520" height="56" rx="14" fill="#FAFBFC"/>
  <rect x="0" y="42" width="520" height="14" fill="#FAFBFC"/>
  <line x1="0" y1="56" x2="520" y2="56" stroke="#E3E8EF" stroke-width="1"/>
  <text x="24" y="35" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#0A2540">Performance Metrics</text>
  <rect x="395" y="16" rx="8" width="105" height="24" fill="#ECFDF3"/>
  <text x="448" y="33" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#16A34A" text-anchor="middle">All improved</text>

  <!-- Metric -->
  <text x="24" y="92" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" letter-spacing="0.5" fill="#8792A2">AVERAGE RESPONSE TIME</text>
  <text x="24" y="124" font-family="system-ui, -apple-system, sans-serif" font-size="34" font-weight="700" fill="#0A2540">-68%</text>
  <text x="128" y="124" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="500" fill="#8792A2">faster page loads</text>

  <!-- Stat cards row -->
  <!-- Before card -->
  <rect x="24" y="140" width="148" height="52" rx="8" fill="#FEF3F2"/>
  <text x="36" y="158" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="500" fill="#F04438" letter-spacing="0.3">BEFORE</text>
  <text x="36" y="180" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#0A2540">1,240ms</text>

  <!-- After card -->
  <rect x="186" y="140" width="148" height="52" rx="8" fill="#ECFDF3"/>
  <text x="198" y="158" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="500" fill="#16A34A" letter-spacing="0.3">AFTER</text>
  <text x="198" y="180" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#0A2540">396ms</text>

  <!-- DB Queries card -->
  <rect x="348" y="140" width="148" height="52" rx="8" fill="#F0EEFF"/>
  <text x="360" y="158" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="500" fill="#635BFF" letter-spacing="0.3">DB QUERIES</text>
  <text x="360" y="180" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#0A2540">-42%</text>

  <!-- Chart area — response time going down (good) -->
  <line x1="40" y1="300" x2="496" y2="300" stroke="#E3E8EF" stroke-width="1"/>
  <line x1="40" y1="215" x2="496" y2="215" stroke="#F0F2F5" stroke-width="1"/>
  <line x1="40" y1="258" x2="496" y2="258" stroke="#F0F2F5" stroke-width="1"/>

  <!-- Y-axis -->
  <text x="32" y="219" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#8792A2" text-anchor="end">1.2s</text>
  <text x="32" y="262" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#8792A2" text-anchor="end">0.6s</text>
  <text x="32" y="304" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#8792A2" text-anchor="end">0s</text>

  <!-- X-axis -->
  <text x="60" y="318" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#8792A2" text-anchor="middle">Day 1</text>
  <text x="170" y="318" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#8792A2" text-anchor="middle">Day 10</text>
  <text x="280" y="318" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#8792A2" text-anchor="middle">Day 20</text>
  <text x="400" y="318" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#8792A2" text-anchor="middle">Day 30</text>

  <!-- Response time curve (descending = improvement) -->
  <path d="M60,218 C90,220 120,224 150,230 C180,238 210,254 240,268 C270,278 310,286 360,290 C400,293 440,294 480,294" stroke="#635BFF" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M60,218 C90,220 120,224 150,230 C180,238 210,254 240,268 C270,278 310,286 360,290 C400,293 440,294 480,294 L480,300 L60,300 Z" fill="url(#perfGrad)"/>

  <!-- End dot -->
  <circle cx="480" cy="294" r="8" fill="#635BFF" opacity="0.12"/>
  <circle cx="480" cy="294" r="5" fill="#FFFFFF" stroke="#635BFF" stroke-width="2.5"/>
  <rect x="454" y="277" width="52" height="16" rx="4" fill="#0A2540"/>
  <text x="480" y="288" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="600" fill="#FFFFFF" text-anchor="middle">396ms</text>
</svg>
