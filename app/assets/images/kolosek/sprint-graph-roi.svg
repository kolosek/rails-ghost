<svg width="520" height="340" viewBox="0 0 520 340" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="stripeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#635BFF" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#635BFF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="stripeLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#635BFF"/>
      <stop offset="100%" stop-color="#0A2540"/>
    </linearGradient>
    <filter id="cardShadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#0A2540" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Card background -->
  <rect width="520" height="340" rx="14" fill="#FFFFFF" filter="url(#cardShadow)"/>
  <rect x="0.5" y="0.5" width="519" height="339" rx="13.5" stroke="#E3E8EF" stroke-width="1"/>

  <!-- Top bar -->
  <rect x="0" y="0" width="520" height="56" rx="14" fill="#FAFBFC"/>
  <rect x="0" y="42" width="520" height="14" fill="#FAFBFC"/>
  <line x1="0" y1="56" x2="520" y2="56" stroke="#E3E8EF" stroke-width="1"/>

  <!-- Top bar content -->
  <text x="24" y="35" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#0A2540">Revenue Impact</text>

  <!-- Tabs -->
  <rect x="160" y="14" width="56" height="28" rx="6" fill="#635BFF"/>
  <text x="188" y="33" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#FFFFFF" text-anchor="middle">6M</text>
  <text x="240" y="33" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#8792A2">1Y</text>
  <text x="280" y="33" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#8792A2">All</text>

  <!-- Badge -->
  <rect x="420" y="16" rx="8" width="80" height="24" fill="#F0EEFF"/>
  <text x="460" y="33" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#635BFF" text-anchor="middle">+384%</text>

  <!-- Metric area -->
  <text x="24" y="92" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" letter-spacing="0.5" fill="#8792A2">PROJECTED RETURN</text>
  <text x="24" y="124" font-family="system-ui, -apple-system, sans-serif" font-size="34" font-weight="700" fill="#0A2540">$28,400</text>
  <text x="210" y="124" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="500" fill="#8792A2">on $5.5k investment</text>

  <!-- Submetrics -->
  <circle cx="30" cy="146" r="4" fill="#635BFF"/>
  <text x="40" y="150" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#0A2540">4.8x ROI</text>
  <circle cx="120" cy="146" r="4" fill="#00D4AA"/>
  <text x="130" y="150" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#0A2540">Breakeven in 3 weeks</text>
  <circle cx="290" cy="146" r="4" fill="#FF7B5C"/>
  <text x="300" y="150" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#0A2540">Compounds monthly</text>

  <!-- Chart area -->
  <!-- Grid lines -->
  <line x1="24" y1="180" x2="496" y2="180" stroke="#F0F2F5" stroke-width="1"/>
  <line x1="24" y1="210" x2="496" y2="210" stroke="#F0F2F5" stroke-width="1"/>
  <line x1="24" y1="240" x2="496" y2="240" stroke="#F0F2F5" stroke-width="1"/>
  <line x1="24" y1="270" x2="496" y2="270" stroke="#F0F2F5" stroke-width="1"/>
  <line x1="24" y1="300" x2="496" y2="300" stroke="#E3E8EF" stroke-width="1"/>

  <!-- Y-axis labels -->
  <text x="14" y="184" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#8792A2" text-anchor="end">$30k</text>
  <text x="14" y="214" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#8792A2" text-anchor="end">$20k</text>
  <text x="14" y="244" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#8792A2" text-anchor="end">$10k</text>
  <text x="14" y="274" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#8792A2" text-anchor="end">$5k</text>
  <text x="14" y="304" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#8792A2" text-anchor="end">$0</text>

  <!-- X-axis labels -->
  <text x="40" y="318" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#8792A2" text-anchor="middle">Sprint</text>
  <text x="135" y="318" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#8792A2" text-anchor="middle">Month 1</text>
  <text x="230" y="318" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#8792A2" text-anchor="middle">Month 2</text>
  <text x="325" y="318" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#8792A2" text-anchor="middle">Month 3</text>
  <text x="420" y="318" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#8792A2" text-anchor="middle">Month 4</text>
  <text x="490" y="318" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#8792A2" text-anchor="middle">Month 6</text>

  <!-- Investment line (flat) -->
  <line x1="40" y1="270" x2="490" y2="270" stroke="#E3E8EF" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="496" y="266" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#8792A2">Cost</text>

  <!-- Revenue area fill -->
  <path d="M40,296 C55,294 70,290 90,286 C115,280 130,272 155,262 C180,252 200,244 230,234 C260,224 290,214 325,202 C355,192 390,186 420,183 C450,180 475,179 490,178 L490,300 L40,300 Z" fill="url(#stripeGrad)"/>

  <!-- Revenue line -->
  <path d="M40,296 C55,294 70,290 90,286 C115,280 130,272 155,262 C180,252 200,244 230,234 C260,224 290,214 325,202 C355,192 390,186 420,183 C450,180 475,179 490,178" stroke="#635BFF" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Breakeven dot -->
  <circle cx="155" cy="262" r="5" fill="#FFFFFF" stroke="#635BFF" stroke-width="2"/>
  <rect x="128" y="244" width="54" height="16" rx="4" fill="#0A2540"/>
  <text x="155" y="255" font-family="system-ui, -apple-system, sans-serif" font-size="8" font-weight="600" fill="#FFFFFF" text-anchor="middle">Breakeven</text>

  <!-- Current value dot with pulse -->
  <circle cx="490" cy="178" r="8" fill="#635BFF" opacity="0.12"/>
  <circle cx="490" cy="178" r="5" fill="#FFFFFF" stroke="#635BFF" stroke-width="2.5"/>

  <!-- Tooltip at current value -->
  <rect x="430" y="160" width="56" height="16" rx="4" fill="#0A2540"/>
  <text x="458" y="171" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="600" fill="#FFFFFF" text-anchor="middle">$28.4k</text>
</svg>
